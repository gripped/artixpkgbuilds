# Zram / Zramen configuration file

# Compression algorithm used for the zram device.
# For an updated list of algorithms, see: https://wiki.archlinux.org/title/Zram#Compression_algorithm
# Supported values: zstd, lzo, lzo-rle, lz4, lz4hc, deflate, 842
#ZRAM_COMP_ALGORITHM=zstd

# Swap priority of the zram device.
# If multiple swap areas exist, the system will use those with a higher priority first.
# Values must be between -1 and 32767; a higher number means higher priority.
#ZRAM_PRIORITY=32767

# Percentage of total system RAM to set as the zram size limit.
# Note: This does not pre-allocate physical RAM upon creation; it only sets the maximum
# uncompressed size the zram device can reach.
# Default: 25. Maximum enforced limit: 250.
#ZRAM_SIZE=100

# Absolute maximum zram size in MiB.
# Highly recommended on systems with large amounts of RAM to cap the maximum size.
# If set, it acts alongside ZRAM_SIZE (the system will use whichever limit is hit first).
# If unset, only the ZRAM_SIZE percentage limit applies.
#ZRAM_MAX_SIZE=16384

# Suppress informational messages from the zramen service during execution.
# 0 = verbose (shows standard startup/shutdown logs)
# 1 = quiet (hides non-error messages)
#ZRAMEN_QUIET=1

# Swapon discard (TRIM) policy for the zram device.
# This helps physically free up memory when swap pages are discarded.
# Supported values:
#   false | none -> Disables discard.
#   true  | both -> Enables full discard (single freed pages and the whole area on swapon).
#   once         -> Performs a single discard operation only during swapon activation.
#   pages        -> Performs discard only for single freed pages.
#ZRAMEN_SWAPON_DISCARD=both
