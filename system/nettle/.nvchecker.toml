[nettle]
source = "gitlab"
gitlab = "nettle/nettle"
host = "git.lysator.liu.se"
use_max_tag = true
# from_pattern = 'nettle_(\d+).(\d+).(\d+)_release_(\d+)'
# to_pattern = '\1.\2.\3'
from_pattern = 'nettle_(\d+).(\d+)_release_(\d+)'
to_pattern = '\1.\2'
# exclude_regex = ".*(pre|a|alpha|b|beta|rc).*"
exclude_regex = ".*rc.*"
